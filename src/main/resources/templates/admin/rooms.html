<h2>All Rooms</h2>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Rent</th>
        <th>Owner</th>
        <th>Action</th>
    </tr>

    <tr th:each="r : ${rooms}">
        <td th:text="${r.title}"></td>
        <td th:text="${r.rent}"></td>
        <td th:text="${r.owner.name}"></td>
        <td>
            <a th:href="@{/admin/rooms/delete/{id}(id=${r.id})}">Delete</a>
        </td>
    </tr>
</table>

<br>
<a href="/admin/dashboard">Back</a>
