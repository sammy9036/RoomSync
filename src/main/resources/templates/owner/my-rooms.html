<h2>My Rooms</h2>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Rent</th>
        <th>Action</th>
    </tr>

    <tr th:each="r : ${rooms}">
        <td th:text="${r.title}"></td>
        <td th:text="${r.rent}"></td>
        <td>
            <a th:href="@{/owner/rooms/delete/{id}(id=${r.id})}">Delete</a>
        </td>
    </tr>
</table>

<br>
<a href="/owner/rooms/add">Add New Room</a>
